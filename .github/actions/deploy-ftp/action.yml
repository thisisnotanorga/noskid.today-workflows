# .github/actions/deploy-ftp/action.yml
name: 'Deploy via FTP'
description: 'Deploy built files to server via FTP, excluding specified files'

inputs:
  build-dir:
    description: 'Path to the build directory'
    required: true
  ftp-server:
    description: 'FTP server address'
    required: true
  ftp-username:
    description: 'FTP username'
    required: true
  ftp-password:
    description: 'FTP password'
    required: true
  ftp-server-dir:
    description: 'Server directory path'
    required: true
  exclude-patterns:
    description: 'Additional exclude patterns (newline separated)'
    required: false
    default: ''

outputs:
  deploy-success:
    description: 'Whether the deployment was successful'
    value: ${{ steps.deploy.outputs.success }}

runs:
  using: 'composite'
  steps:
    - name: Prepare files for FTP upload
      shell: bash
      run: |
        BUILD_DIR="${{ inputs.build-dir }}"
        echo "📁 Preparing files from: $BUILD_DIR"
        
        # Create upload directory
        mkdir -p upload
        
        # Copy all files except api/config.php and text files
        rsync -av \
          --exclude="api/config.php" \
          --exclude="*.txt" \
          --exclude="*.md" \
          --exclude="*.log" \
          --exclude="changelog.txt" \
          "$BUILD_DIR/" upload/
        
        echo "📋 Files prepared for upload:"
        find upload -type f | head -20
        TOTAL_FILES=$(find upload -type f | wc -l)
        echo "📊 Total files to upload: $TOTAL_FILES"
        
        # Calculate total size
        TOTAL_SIZE=$(du -sh upload | cut -f1)
        echo "📏 Total upload size: $TOTAL_SIZE"
    
    - name: Deploy to server via FTP
      id: deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ inputs.ftp-server }}
        username: ${{ inputs.ftp-username }}
        password: ${{ inputs.ftp-password }}
        local-dir: ./upload/
        server-dir: ${{ inputs.ftp-server-dir }}
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/changelog.txt
          **/*.txt
          **/*.md
          **/*.log
          ${{ inputs.exclude-patterns }}
    
    - name: Deployment status
      shell: bash
      run: |
        echo "✅ FTP deployment completed successfully!"
        echo "success=true" >> $GITHUB_OUTPUT