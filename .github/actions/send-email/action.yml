# .github/actions/send-email/action.yml
name: 'Send Email Notification'
description: 'Send deployment notification email with changelog and stats'

inputs:
  smtp-server:
    description: 'SMTP server address'
    required: true
  smtp-port:
    description: 'SMTP server port'
    required: false
    default: '587'
  smtp-username:
    description: 'SMTP username'
    required: true
  smtp-password:
    description: 'SMTP password'
    required: true
  from-email:
    description: 'From email address'
    required: true
  to-email:
    description: 'To email address'
    required: true
  subject:
    description: 'Email subject'
    required: false
    default: '🚀 NoSkid Deployment Notification'
  commit-hash:
    description: 'Commit hash'
    required: true
  api-only:
    description: 'Whether this was API-only deployment'
    required: false
    default: 'false'
  build-dir:
    description: 'Build directory path'
    required: false
    default: ''

outputs:
  email-success:
    description: 'Whether the email was sent successfully'
    value: ${{ steps.send-email.outputs.success }}

runs:
  using: 'composite'
  steps:
    - name: Prepare email content
      id: prepare
      shell: bash
      run: |
        echo "📧 Preparing email content..."
        
        # Get deployment stats
        COMMIT_HASH="${{ inputs.commit-hash }}"
        API_ONLY="${{ inputs.api-only }}"
        BUILD_DIR="${{ inputs.build-dir }}"
        DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
        
        # Create email content file
        cat > email_content.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <style>
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
                .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
                .stats { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
                .changelog { background: #ffffff; border: 1px solid #e9ecef; border-radius: 8px; padding: 15px; margin: 15px 0; }
                .success { color: #28a745; font-weight: bold; }
                .info { color: #17a2b8; }
                .code { background: #f1f3f4; padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; }
                pre { background: #f8f9fa; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>🚀 NoSkid Deployment Success</h1>
                <p class="success">Deployment completed successfully!</p>
            </div>
            
            <div class="stats">
                <h2>📊 Deployment Statistics</h2>
                <ul>
                    <li><strong>Commit Hash:</strong> <span class="code">COMMIT_HASH_PLACEHOLDER</span></li>
                    <li><strong>Deployment Time:</strong> DEPLOY_TIME_PLACEHOLDER</li>
                    <li><strong>Deployment Type:</strong> <span class="info">DEPLOY_TYPE_PLACEHOLDER</span></li>
                    <li><strong>Repository:</strong> <span class="code">GITHUB_REPOSITORY_PLACEHOLDER</span></li>
                    <li><strong>Workflow:</strong> <span class="code">GITHUB_WORKFLOW_PLACEHOLDER</span></li>
                    BUILD_STATS_PLACEHOLDER
                </ul>
            </div>
            
            CHANGELOG_SECTION_PLACEHOLDER
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e9ecef; text-align: center; color: #6c757d;">
                <p>This is an automated notification from your NoSkid deployment workflow.</p>
                <p><small>Generated by GitHub Actions</small></p>
            </div>
        </body>
        </html>
        EOF
        
        # Replace placeholders (using | as delimiter to avoid issues with /)
        sed -i "s|COMMIT_HASH_PLACEHOLDER|$COMMIT_HASH|g" email_content.html
        sed -i "s|DEPLOY_TIME_PLACEHOLDER|$DEPLOY_TIME|g" email_content.html
        sed -i "s|GITHUB_REPOSITORY_PLACEHOLDER|$GITHUB_REPOSITORY|g" email_content.html
        sed -i "s|GITHUB_WORKFLOW_PLACEHOLDER|$GITHUB_WORKFLOW|g" email_content.html
        
        # Set deployment type (using | as delimiter)
        if [ "$API_ONLY" = "true" ]; then
            sed -i "s|DEPLOY_TYPE_PLACEHOLDER|API Only Deployment|g" email_content.html
        else
            sed -i "s|DEPLOY_TYPE_PLACEHOLDER|Full Website Deployment|g" email_content.html
        fi
        
        # Add build statistics if build directory is provided
        if [ -n "$BUILD_DIR" ] && [ -d "$BUILD_DIR" ]; then
            TOTAL_FILES=$(find "$BUILD_DIR" -type f | wc -l)
            TOTAL_SIZE=$(du -sh "$BUILD_DIR" 2>/dev/null | cut -f1 || echo "N/A")
            BUILD_STATS="<li><strong>Files Deployed:</strong> $TOTAL_FILES</li><li><strong>Total Size:</strong> $TOTAL_SIZE</li>"
            sed -i "s|BUILD_STATS_PLACEHOLDER|$BUILD_STATS|g" email_content.html
        else
            sed -i "s|BUILD_STATS_PLACEHOLDER||g" email_content.html
        fi
        
        echo "✅ Email content prepared"
    
    - name: Read changelog and generate final email
      id: changelog
      shell: bash
      run: |
        echo "📖 Reading changelog and generating final email..."
        
        if [ -f "changelog.txt" ]; then
            echo "✅ Changelog found, including in email"
            
            # Create changelog section with proper escaping
            cat > changelog_section.html << 'CHANGELOG_EOF'
            <div class="changelog">
                <h2>📝 Changelog</h2>
                <pre>
        CHANGELOG_EOF
            
            # Append escaped changelog content
            cat changelog.txt | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g; s/'"'"'/\&#39;/g' >> changelog_section.html
            
            # Close the pre and div tags
            cat >> changelog_section.html << 'CHANGELOG_EOF'
                </pre>
            </div>
        CHANGELOG_EOF
        else
            echo "⚠️ No changelog.txt found, using default changelog section"
            cat > changelog_section.html << 'CHANGELOG_EOF'
            <div class="changelog">
                <h2>📝 Changelog</h2>
                <p><em>No changelog available for this deployment.</em></p>
            </div>
        CHANGELOG_EOF
        fi
        
        # Create the final email by combining template and changelog
        # Use awk to replace the placeholder with the changelog content
        awk '
        /CHANGELOG_SECTION_PLACEHOLDER/ {
            while ((getline line < "changelog_section.html") > 0) {
                print line
            }
            close("changelog_section.html")
            next
        }
        { print }
        ' email_content.html > final_email.html
        
        # Clean up temporary files
        rm -f changelog_section.html
        
        echo "✅ Final email generated"
    
    - name: Send email
      id: send-email
      shell: bash
      run: |
        echo "📧 Sending email notification..."
        
        # Install required tools
        if ! command -v sendmail >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -qq
                sudo apt-get install -qq -y ssmtp mailutils
            fi
        fi
        
        # Create ssmtp configuration
        sudo tee /etc/ssmtp/ssmtp.conf > /dev/null << EOF
        root=postmaster
        mailhub=${{ inputs.smtp-server }}:${{ inputs.smtp-port }}
        AuthUser=${{ inputs.smtp-username }}
        AuthPass=${{ inputs.smtp-password }}
        UseTLS=YES
        UseSTARTTLS=YES
        FromLineOverride=YES
        EOF
        
        # Create email with headers
        cat > email_message.txt << EOF
        To: ${{ inputs.to-email }}
        From: ${{ inputs.from-email }}
        Subject: ${{ inputs.subject }}
        Content-Type: text/html; charset=UTF-8
        MIME-Version: 1.0

        EOF
        
        # Append HTML content
        cat final_email.html >> email_message.txt
        
        # Send email
        if ssmtp ${{ inputs.to-email }} < email_message.txt; then
            echo "✅ Email sent successfully!"
            echo "success=true" >> $GITHUB_OUTPUT
        else
            echo "❌ Failed to send email"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
        fi
        
        # Cleanup
        rm -f email_content.html final_email.html email_message.txt
        
        echo "📧 Email notification completed"